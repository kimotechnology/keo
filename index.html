<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keo Studio AI - المنصة الذكية</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // إعدادات Firebase الخاصة بكيمو تكنولوجي
        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            databaseURL: "https://kimo-tecnology-default-rtdb.firebaseio.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:87148239f7cb01fa7cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // بيانات Groq المباشرة بموديل التفكير العميق DeepSeek R1
        const groqApiKey = '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';
        const groqUrl = 'https://api.groq.com/openai/v1/chat/completions';
        const groqModel = 'deepseek-r1-distill-llama-70b'; // موديل التفكير والذكاء الخارق

        let currentChatId = null;
        let uploadedFileContent = ""; // لحفظ نص الملف المرفوع مؤقتاً

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                await checkAndCreateUser(result.user);
            } catch (error) {
                alert("خطأ في تسجيل الدخول: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        async function checkAndCreateUser(user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                await set(userRef, {
                    uid: user.uid,
                    fullName: user.displayName || "مستخدم كيو",
                    email: user.email,
                    createdAt: Date.now()
                });
            }
        }

        // مراقبة حالة المستخدم وجلب بياناته الحية واسمه الحقيقي
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                
                // استخراج الاسم الأول أو الثنائي للمستخدم الحالي ديناميكياً
                const userFirstName = user.displayName ? user.displayName.split(' ')[0] : "User";
                document.getElementById('userNameDisplay').innerText = user.displayName || "المستخدم";
                document.getElementById('userNameDisplayBody').innerText = userFirstName;
                
                if(user.photoURL) {
                    document.getElementById('userAvatarImg').src = user.photoURL;
                }

                // تحميل قائمة شاتات المستخدم الحالي من الداتا بيز
                const chatsRef = ref(db, `users/${user.uid}/chats`);
                onValue(chatsRef, (snapshot) => {
                    const chatsList = document.getElementById('previousChats');
                    chatsList.innerHTML = '';
                    if (snapshot.exists()) {
                        const chats = snapshot.val();
                        Object.keys(chats).forEach(id => {
                            const li = document.createElement('li');
                            li.innerText = chats[id].title || "محادثة جديدة";
                            li.className = currentChatId === id ? 'active' : '';
                            li.onclick = () => loadChat(id);
                            chatsList.appendChild(li);
                        });
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        // زر إنشاء شات جديد والتنظيف
        window.createNewChat = () => {
            currentChatId = null;
            uploadedFileContent = "";
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatMessages').style.display = 'none';
            document.querySelectorAll('.sidebar-menu li').forEach(item => item.classList.remove('active'));
        };

        // فتح ملفات قديمة
        async function loadChat(chatId) {
            currentChatId = chatId;
            document.getElementById('welcomeScreen').style.display = 'none';
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.style.display = 'flex';
            messagesContainer.innerHTML = '';

            const user = auth.currentUser;
            const messagesSnapshot = await get(ref(db, `users/${user.uid}/chats/${chatId}/messages`));
            if (messagesSnapshot.exists()) {
                const messages = messagesSnapshot.val();
                Object.values(messages).forEach(msg => {
                    appendMessageElement(msg.text, msg.sender);
                });
            }
        }

        // معالجة رفع وقراءة الملفات فورياً
        window.triggerFileUpload = () => document.getElementById('hiddenFileInput').click();
        window.handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFileContent = e.target.result;
                document.getElementById('fileBadgeText').innerText = file.name;
                document.getElementById('fileBadge').style.display = 'flex';
            };
            reader.readAsText(file);
        };
        window.removeUploadedFile = () => {
            uploadedFileContent = "";
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('hiddenFileInput').value = "";
        };

        // إرسال الرسالة إلى الـ Agent ومعالجة الـ Deep Thinking
        window.sendMessage = async () => {
            const userInput = document.getElementById('userInput');
            const messageText = userInput.value.trim();
            const user = auth.currentUser;

            if (!messageText || !user) return;

            document.getElementById('welcomeScreen').style.display = 'none';
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.style.display = 'flex';

            // دمج سياق الملف المرفوع إذا وُجد
            let finalPromptToSend = messageText;
            if (uploadedFileContent) {
                finalPromptToSend = `[ملف مرفوع من العميل]:\n${uploadedFileContent}\n\n[سؤال العميل]:\n${messageText}`;
            }

            appendMessageElement(messageText, 'user');
            userInput.value = '';
            removeUploadedFile(); // تصفير خانة الملف بعد الإرسال

            if (!currentChatId) {
                const newChatRef = push(ref(db, `users/${user.uid}/chats`));
                currentChatId = newChatRef.key;
                await set(newChatRef, {
                    title: messageText.substring(0, 20) + '...',
                    createdAt: Date.now()
                });
            }

            const msgListRef = ref(db, `users/${user.uid}/chats/${currentChatId}/messages`);
            push(msgListRef, { text: messageText, sender: 'user' });

            const loadingId = appendMessageElement('جاري التفكير بعمق...', 'bot-loading');

            try {
                const response = await fetch(groqUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqApiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: groqModel,
                        messages: [
                            { 
                                "role": "system", 
                                "content": "You are Keo Studio AI, an advanced full-integrated AI Agent built by Karim Hussein. You have full agent permission to format responses elegantly using structured markdown, create tables, write professional code, and design complete response configurations dynamically based on user needs." 
                            },
                            { "role": "user", "content": finalPromptToSend }
                        ]
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0]) {
                    const rawReply = data.choices[0].message.content;
                    appendMessageElement(rawReply, 'bot');
                    push(msgListRef, { text: rawReply, sender: 'bot' });
                } else {
                    appendMessageElement('خطأ في استجابة محرك غروق الرئيسي.', 'system-error');
                }
            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                appendMessageElement('حدث خطأ أثناء الاتصال بسيرفر الوكيل.', 'system-error');
            }
        };

        // دالة عرض وتنسيق المحادثات وفصل تفكير الـ DeepSeek
        function appendMessageElement(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageWrapper = document.createElement('div');
            messageWrapper.className = `message-wrapper ${sender}`;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            if (sender === 'bot') {
                // فحص ما إذا كان الرد يحتوي على علامات التفكير العميق <think>
                if (text.includes("<think>") && text.includes("</think>")) {
                    const parts = text.split("</think>");
                    const thinkingBlock = parts[0].replace("<think>", "").trim();
                    const finalReplyBlock = parts[1].trim();

                    const id = 'think_' + Math.random().toString(36).substr(2, 9);
                    messageDiv.innerHTML = `
                        <div class="thinking-container">
                            <div class="thinking-header" onclick="document.getElementById('${id}').classList.toggle('expanded')">
                                <span>🧠 تم التفكير لعدة ثوانٍ</span>
                                <span style="font-size:10px;">▼</span>
                            </div>
                            <div class="thinking-body" id="${id}">${thinkingBlock}</div>
                        </div>
                        <div class="final-text">${finalReplyBlock}</div>
                    `;
                } else {
                    messageDiv.innerText = text;
                }
            } else {
                messageDiv.innerText = text;
            }

            messageWrapper.appendChild(messageDiv);
            chatMessages.appendChild(messageWrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageWrapper.id = 'msg_' + Math.random().toString(36).substr(2, 9);
        }

        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('collapsed');
    </script>

    <style>
        :root {
            --bg-main: #161616;
            --bg-sidebar: #1a1a1a;
            --border-color: #262626;
            --text-color: #ffffff;
            --text-muted: #8e8e8e;
            --pill-input-bg: #202020;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        /* شاشة الـ Auth النظيفة */
        .auth-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-main); }
        .auth-btn { background: var(--text-color); color: var(--bg-main); border: none; padding: 14px 28px; border-radius: 24px; font-weight: 600; cursor: pointer; font-size: 15px; margin-top: 24px; transition: 0.2s; }
        .auth-btn:hover { opacity: 0.9; }

        .app-container { display: none; width: 100%; height: 100%; }
        
        /* القائمة الجانبية الفاخرة */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; justify-content: space-between; transition: 0.3s; }
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border-left: none; }
        
        .nav-tabs { display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .nav-tab { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-muted); }
        .nav-tab.active { background: #ffffff0a; color: var(--text-color); font-weight: 500; }

        .new-chat-btn { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; background: transparent; color: var(--text-color); margin-bottom: 15px; }
        .new-chat-btn:hover { background: #ffffff0a; }
        
        .sidebar-menu { flex: 1; overflow-y: auto; list-style: none; display: flex; flex-direction: column; gap: 3px; }
        .sidebar-menu p { font-size: 11px; color: var(--text-muted); margin: 10px 5px 5px; letter-spacing: 0.5px; }
        .sidebar-menu li { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: #ffffff0a; color: var(--text-color); }

        .sidebar-footer { border-top: 1px solid var(--border-color); padding-top: 15px; display: flex; flex-direction: column; gap: 12px; }
        .user-info { display: flex; align-items: center; justify-content: space-between; }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; object-fit: cover; }
        
        /* المساحة المخصصة للـ Chat */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); }
        
        /* ترويسة الصفحة العلوية */
        .top-bar { padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffffff03; }
        .toggle-side { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; }
        .model-selector { font-size: 15px; font-weight: 500; color: var(--text-color); cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* شاشة الترحيب الوسطية المتطابقة */
        .welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .welcome-screen h1 { font-size: 42px; font-weight: 500; margin-bottom: 8px; letter-spacing: -0.5px; }
        .welcome-screen p { color: var(--text-muted); font-size: 14.5px; }

        /* منطقة استعراض رسايل الشات */
        .chat-messages { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 20px 18% 120px; gap: 28px; }
        .message-wrapper { display: flex; width: 100%; }
        .message-wrapper.user { justify-content: flex-start; }
        .message-wrapper.bot { justify-content: flex-start; }
        
        .message { max-width: 85%; font-size: 15.5px; line-height: 1.6; word-wrap: break-word; white-space: pre-line; }
        .message.user { color: var(--text-color); background: #222; padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border-color); }
        .message.bot { color: var(--text-color); width: 100%; }
        .message.bot-loading { color: var(--text-muted); font-size: 13.5px; font-style: italic; animation: pulse 1.5s infinite; }
        .message.system-error { color: #ff5555; font-size: 13.5px; }

        /* ستايل ومستوعبات التفكير العميق المنسدلة (Deep Thinking Accordion) */
        .thinking-container { margin-bottom: 12px; border-right: 2px solid #333; padding-right: 12px; }
        .thinking-header { color: var(--text-muted); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none; padding: 4px 0; }
        .thinking-body { font-size: 13px; color: var(--text-muted); display: none; margin-top: 6px; padding: 4px 0; font-style: italic; }
        .thinking-body.expanded { display: block; }

        /* صندوق الإدخال العائم الطاير (Pill Box Container) */
        .input-wrapper-floating { position: absolute; bottom: 24px; left: 18%; right: 18%; display: flex; flex-direction: column; gap: 8px; }
        .input-container { background: var(--pill-input-bg); border: 1px solid var(--border-color); border-radius: 26px; padding: 6px 14px; display: flex; align-items: center; gap: 10px; }
        .input-container input { flex: 1; background: transparent; border: none; color: var(--text-color); padding: 12px 4px; font-size: 14.5px; outline: none; }
        
        .icon-btn-left { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .icon-btn-left:hover { background: #ffffff05; color: var(--text-color); }
        
        .send-icon-btn { background: var(--text-color); color: var(--bg-main); border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .send-icon-btn:hover { opacity: 0.85; }

        /* بادج الـ File المرفوع الفوقاني */
        .file-badge { background: #222; border: 1px solid var(--border-color); align-self: flex-start; padding: 6px 12px; border-radius: 12px; display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-right: 15px; }
        .file-badge button { background: transparent; border: none; color: #ff5555; cursor: pointer; font-weight: bold; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="auth-screen" id="authScreen">
        <h1 style="font-size: 34px; font-weight: 500; letter-spacing: -0.5px;">Keo Studio AI</h1>
        <p style="color: var(--text-muted); margin-top: 4px; font-size: 14px;">من صنع كريم حسين</p>
        <button class="auth-btn" onclick="loginWithGoogle()">تسجيل الدخول عبر Google</button>
    </div>

    <div class="app-container" id="appContainer">
        
        <div class="sidebar" id="sidebar">
            <div>
                <div class="nav-tabs">
                    <div class="nav-tab active">💬 المحادثات</div>
                    <div class="nav-tab">🤖 الوكلاء (Agents)</div>
                </div>
                
                <button class="new-chat-btn" onclick="createNewChat()">
                    <span>محادثة جديدة</span>
                    <span>+</span>
                </button>
                
                <ul class="sidebar-menu">
                    <p>المحادثات الأخيرة</p>
                    <div id="previousChats"></div>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="profile-section">
                        <img class="user-avatar" id="userAvatarImg" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23333'/></svg>">
                        <p id="userNameDisplay" style="font-weight: 500; font-size: 13.5px; color: var(--text-color);"></p>
                    </div>
                </div>
                <button onclick="logout()" style="background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; text-align: right; padding: 4px 0;">تسجيل الخروج</button>
            </div>
        </div>

        <div class="main-content">
            
            <div class="top-bar">
                <button class="toggle-side" onclick="toggleSidebar()">☰</button>
                <div class="model-selector">Keo-Agent-1.0 (DeepSeek R1) ▾</div>
                <div style="width:20px;"></div>
            </div>
            
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Hi, <span id="userNameDisplayBody">User</span></h1>
                <p>Interact with Keo Studio AI and explore the boundless creative world.</p>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="input-wrapper-floating">
                <div class="file-badge" id="fileBadge">
                    📄 <span id="fileBadgeText">file.txt</span>
                    <button onclick="removeUploadedFile()">✕</button>
                </div>
                
                <div class="input-container">
                    <input type="file" id="hiddenFileInput" style="display: none;" accept=".txt,.json,.csv,.js,.html,.css,.data" onchange="handleFileUpload(event)">
                    <button class="icon-btn-left" onclick="triggerFileUpload()" title="رفع ملف بيانات">+</button>
                    
                    <input type="text" id="userInput" placeholder="How can I help you today?" onkeypress="handleKeyPress(event)">
                    
                    <button class="send-icon-btn" onclick="sendMessage()">↑</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

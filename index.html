<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keo Studio AI - منصة الذكاء الاصطناعي</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // إعدادات Firebase الخاصة بكيمو تكنولوجي
        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            databaseURL: "https://kimo-tecnology-default-rtdb.firebaseio.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:87148239f7cb01fa7cac6d"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // رابط الـ n8n Webhook النهائي بتاعك
        const n8nUrl = 'https://kareem49.app.n8n.cloud/webhook/v1/chat';

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                checkAndCreateUser(result.user);
            } catch (error) {
                alert("خطأ في تسجيل الدخول بجوجل: " + error.message);
            }
        };

        window.registerWithEmail = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            try {
                const result = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(result.user);
                alert("تم إرسال رابط التأكيد إلى إيميلك! يرجى تفعيله.");
                checkAndCreateUser(result.user);
            } catch (error) {
                alert("خطأ في التسجيل: " + error.message);
            }
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("خطأ في تسجيل الدخول: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        // التحقق من وجود المستخدم في قاعدة البيانات وإنشاء ملفه لو جديد
        async function checkAndCreateUser(user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                // توليد API Key عشوائي فريد
                const generatedApiKey = 'keo_live_' + Math.random().toString(36).substr(2, 16);
                await set(userRef, {
                    uid: user.uid,
                    email: user.email,
                    apiKey: generatedApiKey,
                    totalCredits: 100,
                    usedCredits: 0,
                    context: "أنت مساعد ذكي تابع لمنصة Keo Studio AI من صنع كريم حسين."
                });
            }
        }

        // مراقبة حالة المستخدم (هل مسجل دخول أم لا)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authCard').style.display = 'none';
                document.getElementById('mainApp').style.display = 'grid';
                document.getElementById('userEmailDisplay').innerText = user.email;
                
                // جلب بيانات العميل الحية من الداتا بيز
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('apiKeyDisplay').value = data.apiKey;
                        document.getElementById('creditsDisplay').innerText = `${data.usedCredits} / ${data.totalCredits}`;
                        document.getElementById('contextInput').value = data.context || "";
                    }
                });
            } else {
                document.getElementById('authCard').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        // حفظ السايق والملفات يدوياً في الداتا بيز
        window.saveContext = async () => {
            const user = auth.currentUser;
            const contextText = document.getElementById('contextInput').value;
            if(user) {
                await update(ref(db, 'users/' + user.uid), { context: contextText });
                alert("تم حفظ البيانات والملفات بنجاح في السيرفر!");
            }
        };

        // التعامل مع رفع الملفات وقراءتها وتحويلها لنص داخل الـ Context
        window.handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const textContent = e.target.result;
                document.getElementById('contextInput').value += `\n[محتوى ملف مرفوع باسم ${file.name}]:\n${textContent}`;
                saveContext();
            };
            reader.readAsText(file); // يقرأ ملفات الـ txt, csv, json, الخ.
        };

        // إرسال الشات من خلال الـ n8n والـ API Key المولد
        window.sendMessage = async () => {
            const user = auth.currentUser;
            const messageInput = document.getElementById('userInput');
            const messageText = messageInput.value.trim();
            if (!messageText || !user) return;

            appendMessage(messageText, 'user');
            messageInput.value = '';

            const snapshot = await get(ref(db, 'users/' + user.uid));
            const userData = snapshot.val();

            const loadingId = appendMessage('جاري استشارة ذكاء Keo Studio...', 'bot');

            try {
                const response = await fetch(n8nUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': userData.apiKey
                    },
                    body: JSON.stringify({
                        message: messageText,
                        uid: user.uid // نمرر الـ uid للـ n8n عشان يقدر يخصم من قاعدة البيانات مباشرة
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.status === 'success') {
                    appendMessage(data.reply, 'bot');
                } else {
                    appendMessage('خطأ: ' + data.message, 'system-error');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('فشل الاتصال بـ n8n. تأكد من تفعيل الأوتوميشن.', 'system-error');
            }
        };

        function appendMessage(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            const id = 'msg_' + Math.random().toString(36).substr(2, 9);
            messageDiv.id = id;
            messageDiv.className = `message ${sender}`;
            messageDiv.innerText = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }
    </script>

    <style>
        :root { --primary: #007bff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn.google { background: #db4437; }
        .btn.secondary { background: #475569; }
        input, textarea { width: 100%; background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; width: 100%; max-width: 1100px; height: 85vh; }
        .sidebar, .chat-box { background: var(--card); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding: 10px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.4; }
        .message.user { background: var(--primary); align-self: flex-start; }
        .message.bot { background: #334155; align-self: flex-end; }
        .message.system-error { background: #7f1d1d; align-self: center; font-size: 12px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { margin: 0; }
        .chat-input .btn { width: auto; margin: 0; }
    </style>
</head>
<body>

    <div class="auth-card" id="authCard">
        <h2 style="margin-bottom: 5px;">Keo Studio AI</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">من صنع كريم حسين</p>
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="btn" onclick="loginWithEmail()">تسجيل الدخول</button>
        <button class="btn secondary" onclick="registerWithEmail()">إنشاء حساب جديد وتأكيده</button>
        <hr style="border-color: #334155; margin: 15px 0;">
        <button class="btn google" onclick="loginWithGoogle()">الدخول السريع بواسطة Google</button>
    </div>

    <div class="container" id="mainApp" style="display: none;">
        <div class="sidebar">
            <h3 style="color:var(--primary)">Keo Studio AI</h3>
            <p style="font-size:12px; color:#94a3b8" id="userEmailDisplay"></p>
            <hr style="border-color:#334155; margin:10px 0;">
            
            <label style="font-size:12px; color:#94a3b8">مفتاح الـ API الخاص بك:</label>
            <input type="text" id="apiKeyDisplay" readonly style="background:#0f172a; text-align:center; font-family:monospace;">
            
            <p style="font-size:14px; margin-bottom:15px;">الاستهلاك الشهري: <b id="creditsDisplay">0 / 100</b></p>
            
            <label style="font-size:12px; color:#94a3b8">رفع ملف البيانات المرجعية (.txt, .data):</label>
            <input type="file" id="fileUpload" accept=".txt,.json,.csv,.data" onchange="handleFileUpload(event)" style="font-size:12px;">

            <label style="font-size:12px; color:#94a3b8">سياق البيانات الفاهمة (Context):</label>
            <textarea id="contextInput" style="flex:1; resize:none; font-size:13px;" placeholder="سيتم تحميل داتا الملفات هنا تلقائياً، أو اكتب يدويًا..."></textarea>
            <button class="btn" onclick="saveContext()">تحديث وحفظ البيانات</button>
            <button class="btn secondary" onclick="logout()" style="margin-top:5px;">تسجيل الخروج</button>
        </div>

        <div class="chat-box">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">مرحباً بك في Keo Studio AI. أنا بوابتك الذكية المربوطة بـ Firebase و Groq. اسألني أي شيء بناءً على ملفاتك المرفوعة!</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="اكتب رسالتك الذكية هنا...">
                <button class="btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>

</body>
</html>

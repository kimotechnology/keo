<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keo Studio AI</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB48E8FEkT2t_U9kUZYtWLJBxpCtMrAQZY",
            authDomain: "kimo-tecnology.firebaseapp.com",
            databaseURL: "https://kimo-tecnology-default-rtdb.firebaseio.com",
            projectId: "kimo-tecnology",
            storageBucket: "kimo-tecnology.firebasestorage.app",
            messagingSenderId: "27878132504",
            appId: "1:27878132504:web:87148239f7cb01fa7cac6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const groqApiKey = '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';
        const groqUrl = 'https://api.groq.com/openai/v1/chat/completions';
        
        let currentChatId = null;
        let uploadedFileContent = ""; 
        let currentMode = "chat"; // الوضع الافتراضي للمنصة

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                await checkAndCreateUser(result.user);
            } catch (error) {
                alert("خطأ تسجيل الدخول: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        async function checkAndCreateUser(user) {
            const userRef = ref(db, 'users/' + user.uid);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) {
                await set(userRef, {
                    uid: user.uid,
                    fullName: user.displayName || "مستخدم كيو",
                    email: user.email,
                    createdAt: Date.now()
                });
            }
        }

        // التبديل بين الشات والـ Agent
        window.switchMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            if (mode === 'chat') {
                document.getElementById('chatTab').classList.add('active');
                document.getElementById('modelTitle').innerText = "Keo-Agent-1.0 (DeepSeek R1) ▾";
                document.getElementById('welcomeSub').innerText = "Interact with Keo Studio AI and explore the boundless creative world.";
            } else {
                document.getElementById('agentTab').classList.add('active');
                document.getElementById('modelTitle').innerText = "Keo Developer Agent (Full Permissions) ⚡";
                document.getElementById('welcomeSub').innerText = "مرحباً بك في وضع الوكيل الذكي. هنا يمكنك رفع الأكواد، وطلب التنسيقات البرمجية والحلول الشاملة بصلاحيات كاملة.";
            }
            createNewChat();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                
                const userFirstName = user.displayName ? user.displayName.split(' ')[0] : "User";
                document.getElementById('userNameDisplay').innerText = user.displayName || "المستخدم";
                document.getElementById('userNameDisplayBody').innerText = userFirstName;
                
                if(user.photoURL) {
                    document.getElementById('userAvatarImg').src = user.photoURL;
                }

                const chatsRef = ref(db, `users/${user.uid}/chats`);
                onValue(chatsRef, (snapshot) => {
                    const chatsList = document.getElementById('previousChats');
                    chatsList.innerHTML = '';
                    if (snapshot.exists()) {
                        const chats = snapshot.val();
                        Object.keys(chats).forEach(id => {
                            const li = document.createElement('li');
                            li.innerText = chats[id].title || "محادثة جديدة";
                            li.className = currentChatId === id ? 'active' : '';
                            li.onclick = () => loadChat(id);
                            chatsList.appendChild(li);
                        });
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        window.createNewChat = () => {
            currentChatId = null;
            uploadedFileContent = "";
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatMessages').style.display = 'none';
            document.querySelectorAll('.sidebar-menu li').forEach(item => item.classList.remove('active'));
        };

        async function loadChat(chatId) {
            currentChatId = chatId;
            document.getElementById('welcomeScreen').style.display = 'none';
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.style.display = 'flex';
            messagesContainer.innerHTML = '';

            const user = auth.currentUser;
            const messagesSnapshot = await get(ref(db, `users/${user.uid}/chats/${chatId}/messages`));
            if (messagesSnapshot.exists()) {
                const messages = messagesSnapshot.val();
                Object.values(messages).forEach(msg => {
                    appendMessageElement(msg.text, msg.sender);
                });
            }
        }

        window.triggerFileUpload = () => document.getElementById('hiddenFileInput').click();
        window.handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFileContent = e.target.result;
                document.getElementById('fileBadgeText').innerText = file.name;
                document.getElementById('fileBadge').style.display = 'flex';
            };
            reader.readAsText(file);
        };
        window.removeUploadedFile = () => {
            uploadedFileContent = "";
            document.getElementById('fileBadge').style.display = 'none';
            document.getElementById('hiddenFileInput').value = "";
        };

        window.sendMessage = async () => {
            const userInput = document.getElementById('userInput');
            const messageText = userInput.value.trim();
            const user = auth.currentUser;

            if (!messageText || !user) return;

            document.getElementById('welcomeScreen').style.display = 'none';
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.style.display = 'flex';

            let finalPromptToSend = messageText;
            if (uploadedFileContent) {
                finalPromptToSend = `[User Uploaded Data/Code Source]:\n${uploadedFileContent}\n\n[User Directive]:\n${messageText}`;
            }

            appendMessageElement(messageText, 'user');
            userInput.value = '';
            removeUploadedFile();

            if (!currentChatId) {
                const newChatRef = push(ref(db, `users/${user.uid}/chats`));
                currentChatId = newChatRef.key;
                await set(newChatRef, {
                    title: messageText.substring(0, 20) + '...',
                    createdAt: Date.now()
                });
            }

            const msgListRef = ref(db, `users/${user.uid}/chats/${currentChatId}/messages`);
            push(msgListRef, { text: messageText, sender: 'user' });

            const loadingId = appendMessageElement('جاري استدعاء المعالج والتفكير بالحلول...', 'bot-loading');

            // تخصيص التوجيه بناء على نوع الحوار (شات عادي أو وكيل مطور ذكي)
            let systemInstruction = "You are Keo Studio AI, a high-fidelity intelligence assistant created by Karim Hussein.";
            if(currentMode === "agent") {
                systemInstruction = "You are the Ultimate Keo Developer Agent. You have root-level permissions to design advanced systems, manage workflows, read uploaded source codes, fix client scripts, structure database configurations, and format responses flawlessly. Always provide comprehensive code structures when requested.";
            }

            try {
                const response = await fetch(groqUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${groqApiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "deepseek-r1-distill-llama-70b", // الموديل المعتمد والمتاح رسمياً بدون أخطاء الـ 400
                        messages: [
                            { "role": "user", "content": `${systemInstruction}\n\nUser Question: ${finalPromptToSend}` }
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (data.choices && data.choices[0]) {
                    const rawReply = data.choices[0].message.content;
                    appendMessageElement(rawReply, 'bot');
                    push(msgListRef, { text: rawReply, sender: 'bot' });
                } else {
                    appendMessageElement('حدث خطأ في صياغة الاستجابة: الرجاء المحاولة مرة أخرى.', 'system-error');
                }
            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                appendMessageElement('فشل الاتصال الخارجي. تأكد من ثبات الاتصال بالإنترنت لديك.', 'system-error');
            }
        };

        function appendMessageElement(text, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageWrapper = document.createElement('div');
            messageWrapper.className = `message-wrapper ${sender}`;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            if (sender === 'bot') {
                // تصفية وفصل التفكير العميق عن النص الأساسي بشكل تلقائي
                if (text.includes("<think>") && text.includes("</think>")) {
                    const parts = text.split("</think>");
                    const thinkingBlock = parts[0].replace("<think>", "").trim();
                    const finalReplyBlock = parts[1].trim();

                    const id = 'think_' + Math.random().toString(36).substr(2, 9);
                    messageDiv.innerHTML = `
                        <div class="thinking-container">
                            <div class="thinking-header" onclick="document.getElementById('${id}').classList.toggle('expanded')">
                                <span>🧠 تم التفكير (اضغط لاستعراض الخطوات البرمجية)</span>
                                <span style="font-size:10px;">▼</span>
                            </div>
                            <div class="thinking-body" id="${id}">${thinkingBlock}</div>
                        </div>
                        <div class="final-text">${finalReplyBlock}</div>
                    `;
                } else {
                    messageDiv.innerText = text;
                }
            } else {
                messageDiv.innerText = text;
            }

            messageWrapper.appendChild(messageDiv);
            chatMessages.appendChild(messageWrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageWrapper.id = 'msg_' + Math.random().toString(36).substr(2, 9);
        }

        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('collapsed');
    </script>

    <style>
        :root {
            --bg-main: #131313;
            --bg-sidebar: #181818;
            --border-color: #222222;
            --text-color: #f3f3f3;
            --text-muted: #888888;
            --pill-input-bg: #1e1e1e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        .auth-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-main); }
        .auth-btn { background: var(--text-color); color: var(--bg-main); border: none; padding: 12px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 20px; }

        .app-container { display: none; width: 100%; height: 100%; }
        
        /*Sidebar التبديل الاحترافي */
        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 16px; justify-content: space-between; transition: 0.25s ease-in-out; }
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border-left: none; }
        
        .nav-tabs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .nav-tab { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-muted); transition: 0.2s; }
        .nav-tab:hover, .nav-tab.active { background: #ffffff0a; color: var(--text-color); font-weight: 500; }

        .new-chat-btn { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13.5px; background: transparent; color: var(--text-color); margin-bottom: 15px; }
        
        .sidebar-menu { flex: 1; overflow-y: auto; list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-menu p { font-size: 11px; color: var(--text-muted); margin: 5px; }
        .sidebar-menu li { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-menu li:hover { background: #ffffff06; color: var(--text-color); }

        .sidebar-footer { border-top: 1px solid var(--border-color); padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; object-fit: cover; }

        /* منطقة العمل الرئيسية العائمة بالكامل في المنتصف */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); height: 100%; }
        
        .top-bar { padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffffff02; }
        .toggle-side { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
        .model-selector { font-size: 14.5px; font-weight: 500; color: var(--text-color); }

        .welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .welcome-screen h1 { font-size: 40px; font-weight: 500; margin-bottom: 10px; letter-spacing: -0.5px; }
        .welcome-screen p { color: var(--text-muted); font-size: 14.5px; max-width: 500px; line-height: 1.5; }

        /* محاذاة الشات وتمركزه بوسط الشاشة تماماً مثل المنصات العالمية */
        .chat-messages { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 20px 22% 140px; gap: 32px; }
        .message-wrapper { display: flex; width: 100%; }
        .message-wrapper.user { justify-content: flex-end; } /* رسايل المستخدم على اليمين لمنع اللخبطة */
        .message-wrapper.bot { justify-content: flex-start; }
        
        .message { max-width: 85%; font-size: 15.5px; line-height: 1.65; word-wrap: break-word; white-space: pre-line; }
        .message.user { color: var(--text-color); background: #1f1f1f; padding: 12px 18px; border-radius: 20px; border: 1px solid var(--border-color); }
        .message.bot { color: var(--text-color); width: 100%; }
        .message.bot-loading { color: var(--text-muted); font-size: 13px; font-style: italic; }
        .message.system-error { color: #ff5252; font-size: 13.5px; font-weight: bold; }

        /* حاوية زر التفكير العميق المنبثق الأنيق */
        .thinking-container { margin-bottom: 15px; border-right: 2px solid #2a2a2a; padding-right: 12px; background: #ffffff02; padding: 10px; border-radius: 8px; }
        .thinking-header { color: #81a1c1; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; user-select: none; font-weight: 500; }
        .thinking-body { font-size: 13px; color: var(--text-muted); display: none; margin-top: 8px; line-height: 1.6; border-top: 1px solid #ffffff05; padding-top: 8px; }
        .thinking-body.expanded { display: block; }

        /* مستوعب صندوق الإدخال الطاير المتناسق */
        .input-wrapper-floating { position: absolute; bottom: 28px; left: 22%; right: 22%; display: flex; flex-direction: column; gap: 8px; }
        .input-container { background: var(--pill-input-bg); border: 1px solid var(--border-color); border-radius: 28px; padding: 6px 14px; display: flex; align-items: center; gap: 12px; }
        .input-container input { flex: 1; background: transparent; border: none; color: var(--text-color); padding: 12px 4px; font-size: 14.5px; outline: none; }
        
        .icon-btn-left { background: transparent; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .icon-btn-left:hover { color: var(--text-color); background: #ffffff05; }
        
        .send-icon-btn { background: var(--text-color); color: var(--bg-main); border: none; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; font-weight: bold; }

        .file-badge { background: #1c1c1c; border: 1px solid var(--border-color); align-self: flex-start; padding: 6px 14px; border-radius: 14px; display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-right: 10px; }
        .file-badge button { background: transparent; border: none; color: #ff5252; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-screen" id="authScreen">
        <h1 style="font-size: 32px; font-weight: 500;">Keo Studio AI</h1>
        <p style="color: var(--text-muted); margin-top: 5px; font-size: 13.5px;">Designed by Karim Hussein</p>
        <button class="auth-btn" onclick="loginWithGoogle()">تسجيل الدخول عبر Google</button>
    </div>

    <div class="app-container" id="appContainer">
        
        <div class="sidebar" id="sidebar">
            <div>
                <div class="nav-tabs">
                    <div class="nav-tab active" id="chatTab" onclick="switchMode('chat')">💬 المحادثات العامة</div>
                    <div class="nav-tab" id="agentTab" onclick="switchMode('agent')">🤖 المطور (Agent Mode)</div>
                </div>
                
                <button class="new-chat-btn" onclick="createNewChat()">
                    <span>محادثة جديدة</span>
                    <span>+</span>
                </button>
                
                <ul class="sidebar-menu">
                    <p>المحادثات الأخيرة</p>
                    <div id="previousChats"></div>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <img class="user-avatar" id="userAvatarImg" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23333'/></svg>">
                    <p id="userNameDisplay" style="font-weight: 500; font-size: 13px; color: var(--text-color);"></p>
                </div>
                <button onclick="logout()" style="background: transparent; border: none; color: var(--text-muted); font-size: 11.5px; cursor: pointer; text-align: right;">تسجيل الخروج</button>
            </div>
        </div>

        <div class="main-content">
            
            <div class="top-bar">
                <button class="toggle-side" onclick="toggleSidebar()">☰</button>
                <div class="model-selector" id="modelTitle">Keo-Agent-1.0 (DeepSeek R1) ▾</div>
                <div style="width:20px;"></div>
            </div>
            
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Hi, <span id="userNameDisplayBody">User</span></h1>
                <p id="welcomeSub">Interact with Keo Studio AI and explore the boundless creative world.</p>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="input-wrapper-floating">
                <div class="file-badge" id="fileBadge">
                    📄 <span id="fileBadgeText">code.js</span>
                    <button onclick="removeUploadedFile()">✕</button>
                </div>
                
                <div class="input-container">
                    <input type="file" id="hiddenFileInput" style="display: none;" accept=".txt,.json,.csv,.js,.html,.css,.py" onchange="handleFileUpload(event)">
                    <button class="icon-btn-left" onclick="triggerFileUpload()" title="إضافة ملف سياق/كود">+</button>
                    
                    <input type="text" id="userInput" placeholder="How can I help you today?" onkeypress="handleKeyPress(event)">
                    
                    <button class="send-icon-btn" onclick="sendMessage()">↑</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
